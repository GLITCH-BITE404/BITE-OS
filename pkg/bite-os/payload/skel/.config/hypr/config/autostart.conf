exec-once = systemctl --user start hyprpolkitagent
exec-once = awww-daemon
exec-once = ~/.config/hypr/scripts/wallpaper-restore.sh
exec-once = hypridle
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Main.qml
# TopBar.qml and Floating.qml are already loaded by Shell.qml (via qs_manager
# below). Standalone exec-once for them duplicated the bar + clock — disabled.
# exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/TopBar.qml
# exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Floating.qml
exec-once = python3 ~/.config/hypr/scripts/quickshell/focustime/focus_daemon.py &
exec-once = ~/.config/hypr/scripts/init.sh
exec-once = ~/.config/hypr/scripts/settings_watcher.sh &
exec-once = ~/.config/hypr/scripts/qs_manager.sh toggle guide & 
exec-once = playerctld
exec-once = swayosd-server --top-margin 0.9 --style "$HOME/.config/swayosd/style.css"
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = ~/.config/hypr/scripts/volume_listener.sh
exec-once = ~/.config/hypr/scripts/update_notifier.sh

# ━━━ LIVE-ISO ONLY: auto-open the BITE-OS installer ━━━
# `grep archisobasedir /proc/cmdline` is true only when booted from the live
# ISO. On installed systems this expression is false and the line is a no-op,
# so the installer never auto-runs after install.
exec-once = bash -c 'grep -q archisobasedir /proc/cmdline && sleep 6 && /usr/local/bin/install-bite-os'
